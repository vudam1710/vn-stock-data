<!-- SVG Shared Definitions Template — include inside each chart SVG -->
<defs>
  <linearGradient id="gradient-blue" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2554E7" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#2554E7" stop-opacity="0.02"/>
  </linearGradient>
  <linearGradient id="gradient-green" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#10B981" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#10B981" stop-opacity="0.02"/>
  </linearGradient>
  <linearGradient id="gradient-red" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#EF4444" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#EF4444" stop-opacity="0.02"/>
  </linearGradient>
  <linearGradient id="gradient-confidence" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2554E7" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#2554E7" stop-opacity="0.03"/>
  </linearGradient>
  <pattern id="pattern-stripes" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#F97316" stroke-width="1" stroke-opacity="0.15"/>
  </pattern>
  <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.05"/>
  </filter>
  <clipPath id="clip-chart">
    <rect x="0" y="0" width="100%" height="100%"/>
  </clipPath>
</defs>
